<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Flight Tracker — Variant A (Weather)</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>

<!-- React + Babel (development; replace with bundler in production) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { margin:0; padding:0; height:100%; background:#76b6ff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; }
  #root { height:100vh; width:100vw; overflow:hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="flight-data.jsx"></script>
<script type="text/babel" src="shared-map.jsx"></script>
<script type="text/babel" src="location-picker.jsx"></script>
<script type="text/babel" src="variants.jsx"></script>

<script type="text/babel" data-presets="env,react">
function App() {
  const { location, status: geoStatus, setLocation, useGeolocation, reset: resetLocation } = useLocation();
  const { planes, status, lastUpdate } = useFlights({
    radiusNm: 25, intervalMs: 8000, demo: false, location,
  });

  React.useEffect(() => {
    if (location.source === 'default') useGeolocation();
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  return (
    <div style={{height:'100vh', width:'100vw', overflow:'hidden'}}>
      <WeatherVariant
        planes={planes} status={status} lastUpdate={lastUpdate} house={location}
        mapStyle="light" showPaths={false} showTrails={true} timeOfDay={0.5}
        overheadTreatment="hero"
        width={window.innerWidth} height={window.innerHeight}
      />
      <LocationPicker
        location={location} status={geoStatus}
        onSet={setLocation} onUseGeo={useGeolocation} onReset={resetLocation}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
